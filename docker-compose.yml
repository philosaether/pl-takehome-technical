# Local dev topology for the Postgres path (Path 1). Functional from M1, when the
# postgres driver lands; in M0 the worker/loadgen containers build and start but
# report "not implemented (M1)". The Valkey path mirrors this in M3.
#
#   store (stock postgres)  +  worker (plq:postgres, WORKERS=N)  +  loadgen (plq:postgres)
#
# Worker-count sweep = re-run with PLQ_WORKERS set (env-per-run, comparable).

services:
  postgres:
    image: postgres:16
    environment: &pg-env
      POSTGRES_PASSWORD: plq
      POSTGRES_USER: plq
      POSTGRES_DB: plq
    ports:
      - "5433:5432"   # host 5433 = the Makefile default DSN (dodges a stock local PG on 5432);
                      # the containerized worker/loadgen still reach it as postgres:5432 over the network
    healthcheck: &pg-healthcheck
      test: ["CMD-SHELL", "pg_isready -U plq"]
      interval: 2s
      timeout: 3s
      retries: 20

  # Second PG primary for the local sharded-PG smoke + the 2-shard conformance gate
  # (run-cloud-2's multi-DSN router). Same config; host 5434.
  postgres-2:
    image: postgres:16
    environment: *pg-env
    ports:
      - "5434:5432"
    healthcheck: *pg-healthcheck

  worker:
    build:
      context: .
      dockerfile: deploy/postgres.Dockerfile
    command: ["worker"]
    environment:
      PLQ_BACKEND: postgres
      PLQ_POSTGRES_DSN: postgres://plq:plq@postgres:5432/plq?sslmode=disable
      PLQ_WORKERS: "10"
      PLQ_PROCESS: zero
    depends_on:
      postgres:
        condition: service_healthy

  loadgen:
    build:
      context: .
      dockerfile: deploy/postgres.Dockerfile
    command: ["loadgen"]
    environment:
      PLQ_BACKEND: postgres
      PLQ_POSTGRES_DSN: postgres://plq:plq@postgres:5432/plq?sslmode=disable
      PLQ_LOAD_KEYS: "100"
      PLQ_LOAD_TASKS: "10000"
    depends_on:
      postgres:
        condition: service_healthy

  # Path 2 datastore (Valkey, M3). `make up-valkey` brings up all 4 instances
  # (6379-6382) so the host-side shard sweep (`make head-to-head`) can hit 1/2/4
  # independent primaries; `make load-test-valkey` uses just :6379 (1-shard baseline).
  # Durability config = the self-hosted defaults from the accepted design
  # (valkey-work-unit-queue.md §Durability & loss): ≤~1s loss window, never evict.
  # All four share one command/healthcheck via the anchors below.
  valkey:
    image: valkey/valkey:8.1
    command: &valkey-command
      - valkey-server
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec               # ≤~1s loss window — the sane queue default (NOT WAITAOF: posture)
      - --aof-use-rdb-preamble
      - "yes"
      - --maxmemory
      - 512mb                  # keep well under host RAM (snapshot fork COW headroom)
      - --maxmemory-policy
      - noeviction             # a full instance REJECTS enqueues, never silently drops queued work
    ports:
      - "6379:6379"
    healthcheck: &valkey-healthcheck
      test: ["CMD", "valkey-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 20

  # Shards 2-4 for the local linearity sweep (independent primaries, same config).
  valkey-2:
    image: valkey/valkey:8.1
    command: *valkey-command
    ports:
      - "6380:6379"
    healthcheck: *valkey-healthcheck

  valkey-3:
    image: valkey/valkey:8.1
    command: *valkey-command
    ports:
      - "6381:6379"
    healthcheck: *valkey-healthcheck

  valkey-4:
    image: valkey/valkey:8.1
    command: *valkey-command
    ports:
      - "6382:6379"
    healthcheck: *valkey-healthcheck
